name: bill_mate
description: A bill reminder app — never miss a payment.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  flutter_bloc: ^8.1.5
  equatable: ^2.0.5

  hive: ^2.2.3
  hive_flutter: ^1.1.0

  flutter_local_notifications: ^17.2.2
  timezone: ^0.9.4

  alarm: ^4.0.2
  lottie: ^3.1.0


  uuid: ^4.3.3
  intl: ^0.19.0
  path_provider: ^2.1.3
  image_picker: ^1.1.2
  cupertino_icons: ^1.0.6

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  hive_generator: ^2.0.1
  build_runner: ^2.4.9
  analyzer: 6.4.1

flutter:
  uses-material-design: true
  assets:
    - assets/alarm.mp3
    - assets/lottie/splash.json

